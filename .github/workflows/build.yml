name: Build OrangeFox Recovery

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout device tree
        run: |
          git clone --depth=1 https://github.com/Myron-Forge/device_xiaomi_myron.git device/xiaomi/myron
      
      - name: Checkout OrangeFox source
        run: |
          mkdir -p ~/work
          cd ~/work
          repo init -u https://github.com/OrangeFoxRecovery/Manifest.git -b fox_9.0 --depth=1
          repo sync -c -j8 --no-tags
      
      - name: Setup build environment
        run: |
          source ~/work/device/xiaomi/myron/../..
          export DEVICE=myron
          export OEM=xiaomi
          export TARGET=recoveryimage
          export FOX_BRANCH=fox_9.0
          export OF_MAINTAINER=KouJunHao
          export FOX_USE_LATEST_MAGISK=true
          export USE_CCACHE=1
          export CCACHE_SIZE=50G
          export J_VAL=8
          
      - name: Build OrangeFox
        run: |
          cd ~/work
          source build/envsetup.sh
          lunch omni_myron-eng
          mka -j8 recoveryimage
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OrangeFox-myron
          path: ~/work/out/target/product/myron/OrangeFox*.zip
