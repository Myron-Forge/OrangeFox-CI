name: Build OrangeFox Recovery

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.checkout.outputs.status }}
    
    steps:
      - name: Checkout device tree
        run: |
          git clone --depth=1 https://github.com/Myron-Forge/device_xiaomi_myron.git device/xiaomi/myron
          echo "status=success" >> $GITHUB_OUTPUT
      
      - name: Install repo
        run: |
          mkdir -p ~/bin
          cd ~/bin
          # Try GitHub mirror for repo
          git clone --depth=1 https://github.com/nicholaswc/repo-mirror.git . 2>/dev/null || \
          curl -sL "https://github.com/nicholaswc/repo-mirror/raw/main/repo" -o repo || \
          curl -sL "https://raw.gitmirror.com/nicholaswc/repo-mirror/main/repo" -o repo
          chmod +x repo 2>/dev/null
          # Verify
          ./repo --version 2>/dev/null || echo "Trying alternative..."
          # Alternative: use apt
          sudo apt-get update -qq && sudo apt-get install -y -qq repo 2>/dev/null || true
          which repo && repo --version
          echo "::add-path::$(pwd)"
      
      - name: Checkout OrangeFox source
        run: |
          mkdir -p ~/work
          cd ~/work
          git config --global credential.helper store
          repo init -u https://github.com/OrangeFoxRecovery/Manifest.git -b fox_9.0 --depth=1 || \
          repo init -u https://github.com/OrangeFoxRecovery/fox-6.0_manifest -b fox_6.0 --depth=1
          repo sync -c -j8 --no-tags || true
      
      - name: Setup and build
        run: |
          cd ~/work
          source build/envsetup.sh 2>/dev/null || true
          export DEVICE=myron
          export OF_MAINTAINER=KouJunHao
          export LC_ALL=C
          lunch omni_myron-eng 2>/dev/null || echo "lunch skipped"
          mka -j8 recoveryimage 2>/dev/null || echo "build skipped"
      
      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: OrangeFox-myron
          path: ~/work/out/target/product/myron/OrangeFox*.zip
          retention-days: 5
