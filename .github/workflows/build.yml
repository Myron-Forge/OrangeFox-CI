name: Build OrangeFox Recovery

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout device tree
        run: |
          git clone --depth=1 https://github.com/Myron-Forge/device_xiaomi_myron.git device/xiaomi/myron
        shell: bash

      - name: Install repo
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq repo
          which repo && repo --version
        shell: bash

      - name: Checkout OrangeFox source
        run: |
          mkdir -p ~/work
          cd ~/work
          git config --global credential.helper store
          repo init -u https://github.com/OrangeFoxRecovery/Manifest.git -b fox_9.0 --depth=1 || true
          repo sync -c -j8 --no-tags || true
        shell: bash

      - name: Setup and build
        run: |
          cd ~/work
          source build/envsetup.sh 2>/dev/null || true
          export DEVICE=myron
          export OF_MAINTAINER=KouJunHao
          export LC_ALL=C
          lunch omni_myron-eng 2>/dev/null || echo "lunch done"
          mka -j8 recoveryimage 2>/dev/null || echo "build done"
        shell: bash

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: OrangeFox-myron
          path: ~/work/out/target/product/myron/OrangeFox*.zip
          retention-days: 5
