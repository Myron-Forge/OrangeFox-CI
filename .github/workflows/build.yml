name: Build OrangeFox Recovery

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout device tree
        run: |
          git clone --depth=1 https://github.com/Myron-Forge/device_xiaomi_myron.git device/xiaomi/myron
      
      - name: Install repo
        run: |
          wget -q -O ~/bin/repo "https://storage.googleapis.com/git-repo-downloads/repo" || \
          curl -sL "https://raw.githubusercontent.com/OrangeFoxRecovery/fox-6.0_build/master/repo" -o ~/bin/repo
          chmod +x ~/bin/repo
          echo "::add-path::$(pwd)/bin"
      
      - name: Checkout OrangeFox source
        run: |
          mkdir -p ~/work
          cd ~/work
          git config --global credential.helper store
          repo init -u https://github.com/OrangeFoxRecovery/Manifest.git -b fox_9.0 --depth=1
          repo sync -c -j8 --no-tags --force-fetch
      
      - name: Setup and build
        run: |
          cd ~/work
          source build/envsetup.sh
          export DEVICE=myron
          export OF_MAINTAINER=KouJunHao
          export FOX_USE_LATEST_MAGISK=true
          export USE_CCACHE=1
          export LC_ALL=C
          lunch omni_myron-eng
          mka -j8 recoveryimage
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OrangeFox-myron
          path: ~/work/out/target/product/myron/OrangeFox*.zip
          retention-days: 5
